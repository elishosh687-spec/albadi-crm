name: Poll factory refresh

# Polls /api/factory/refresh every 5 minutes. We can't use Vercel cron on
# the Hobby plan (limited to daily), so GitHub Actions schedules it.
# Required repo secret: VERCEL_CRON_SECRET — must equal the production
# CRON_SECRET env var in Vercel.

on:
  schedule:
    # Every 15 min. Factory replies ~twice a day so latency is what matters,
    # not throughput. GitHub Actions free-tier skips scheduled runs under load
    # — 15 min cadence means a 1–2 skip burst still keeps worst-case latency
    # under an hour. ~96 runs/day × ~15s ≈ 720 min/month, well under the
    # 2000-min free quota. workflow_dispatch lets us trigger on demand.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Hit refresh endpoint
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.VERCEL_CRON_SECRET }}" \
            "https://albadi-crm.vercel.app/api/factory/refresh" \
            | tee response.json
          echo
          echo "Done."
